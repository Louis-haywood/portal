<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LH / PORTAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:           #0f0f0e;
  --bg-2:         #171715;
  --text:         #f0ece3;
  --text-mid:     #9a9690;
  --text-dim:     #4a4845;
  --accent:       #e83a00;
  --accent-hot:   #ff4400;
  --rule:         #222220;
  --rule-bright:  #333330;
  --green:        #39ff87;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'IBM Plex Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ─── PIN SCREEN ──────────────────────────────────────────────── */

#pin-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: opacity 0.55s ease, transform 0.55s ease;
}

#pin-screen.unlocking {
  opacity: 0;
  transform: translateY(-18px);
  pointer-events: none;
}

.pin-masthead {
  position: absolute;
  top: 36px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--rule-bright);
}

.pin-masthead .logo {
  font-family: var(--font-display);
  font-size: 52px;
  letter-spacing: 0.02em;
  line-height: 1;
  color: var(--text);
}

.pin-masthead .meta {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.18em;
}

.pin-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.pin-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--rule-bright);
  filter: grayscale(30%);
}

.pin-label {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.25em;
  color: var(--text-dim);
}

.pin-dots {
  display: flex;
  gap: 18px;
}

.pin-dot {
  width: 13px;
  height: 13px;
  border: 1.5px solid var(--rule-bright);
  border-radius: 50%;
  transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
}

.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.15);
}

.pin-error {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--accent);
  text-transform: uppercase;
  height: 14px;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.pin-error.visible { opacity: 1; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  18%      { transform: translateX(-9px); }
  36%      { transform: translateX(9px); }
  54%      { transform: translateX(-6px); }
  72%      { transform: translateX(6px); }
  90%      { transform: translateX(-3px); }
}

.pin-dots.shake { animation: shake 0.42s ease; }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  grid-template-rows: repeat(4, 64px);
  gap: 8px;
}

.num-btn {
  background: var(--bg-2);
  border: 1px solid var(--rule-bright);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 30px;
  letter-spacing: 0.04em;
  cursor: pointer;
  line-height: 1;
  transition: background 0.1s, border-color 0.1s, transform 0.08s;
  user-select: none;
}

.num-btn:hover  { background: var(--rule-bright); border-color: var(--text-dim); }
.num-btn:active { background: var(--accent); border-color: var(--accent); transform: scale(0.94); }

.num-btn.del {
  font-family: var(--font-body);
  font-size: 15px;
}

.num-btn.ghost {
  background: transparent;
  border-color: transparent;
  pointer-events: none;
}

/* ─── PORTAL ──────────────────────────────────────────────────── */

#portal {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
  transition: opacity 0.55s ease 0.25s, transform 0.55s ease 0.25s;
}

#portal.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* ─── HEADER ──────────────────────────────────────────────────── */

.portal-header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  padding: 26px 40px 14px;
  border-bottom: 2px solid var(--rule-bright);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--rule-bright);
  filter: grayscale(20%);
  flex-shrink: 0;
}

.portal-title {
  font-family: var(--font-display);
  font-size: 54px;
  line-height: 1;
  letter-spacing: 0.02em;
}

.portal-owner {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.2em;
}

.header-right { text-align: right; }

.clock {
  font-family: var(--font-display);
  font-size: 46px;
  line-height: 1;
  letter-spacing: 0.06em;
}

.date-str {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  margin-top: 2px;
}

/* ─── SEARCH ──────────────────────────────────────────────────── */

.search-bar {
  padding: 20px 40px;
  border-bottom: 1px solid var(--rule);
}

.search-inner {
  display: flex;
  align-items: stretch;
  border: 1.5px solid var(--rule-bright);
  max-width: 760px;
  transition: border-color 0.18s;
}

.search-inner:focus-within { border-color: var(--accent); }

.search-prefix {
  padding: 11px 15px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  border-right: 1px solid var(--rule-bright);
  background: var(--bg-2);
  display: flex;
  align-items: center;
  white-space: nowrap;
}

#q {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 11px 14px;
}

#q::placeholder { color: var(--text-dim); }

.search-go {
  background: var(--accent);
  border: none;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 22px;
  padding: 0 20px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
}

.search-go:hover { background: var(--accent-hot); }

/* ─── QUICK BUTTONS ───────────────────────────────────────────── */

.quick-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  min-height: 420px;
}

.qb {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 30px 36px 28px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  text-decoration: none;
  color: var(--text);
  overflow: hidden;
  transition: background 0.22s ease;
}

.qb:nth-child(2n)       { border-right: none; }
.qb:nth-last-child(-n+2){ border-bottom: none; }

.qb::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.28s ease;
}

.qb:not(.soon):hover            { background: var(--bg-2); }
.qb:not(.soon):hover::after     { transform: scaleX(1); }

.qb-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.qb-num {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.22em;
}

.qb-badge {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-dim);
  border: 1px solid var(--rule-bright);
  padding: 2px 6px;
}

.qb-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px 0 14px;
}

.qb-name {
  font-family: var(--font-display);
  font-size: 80px;
  line-height: 0.88;
  letter-spacing: 0.02em;
  transition: color 0.2s;
}

.qb.soon .qb-name { color: var(--text-dim); }

.qb-url {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 12px;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}

.qb:not(.soon):hover .qb-url { color: var(--text-mid); }

.qb-bottom {
  display: flex;
  justify-content: flex-end;
}

.qb-arrow {
  font-family: var(--font-display);
  font-size: 36px;
  color: var(--text-dim);
  line-height: 1;
  transition: color 0.2s, transform 0.22s;
}

.qb:not(.soon):hover .qb-arrow {
  color: var(--accent);
  transform: translate(5px, -2px);
}

.qb.soon { cursor: default; }

/* ─── FOOTER ──────────────────────────────────────────────────── */

.portal-footer {
  padding: 14px 40px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-id {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-dim);
}

.lock-btn {
  background: none;
  border: 1px solid var(--rule-bright);
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  padding: 5px 11px;
  cursor: pointer;
  transition: color 0.14s, border-color 0.14s;
}

.lock-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ─── ENTRY ANIMATIONS ────────────────────────────────────────── */

@keyframes riseIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.qb {
  animation: riseIn 0.4s ease both;
}

.qb:nth-child(1) { animation-delay: 0.06s; }
.qb:nth-child(2) { animation-delay: 0.12s; }
.qb:nth-child(3) { animation-delay: 0.18s; }
.qb:nth-child(4) { animation-delay: 0.24s; }

/* ─── RESPONSIVE ──────────────────────────────────────────────── */

@media (max-width: 560px) {
  .portal-header { padding: 18px 20px 12px; }
  .portal-title  { font-size: 38px; }
  .clock         { font-size: 32px; }
  .search-bar    { padding: 16px 20px; }
  .quick-grid    { grid-template-columns: 1fr; min-height: unset; }
  .qb            { border-right: none !important; }
  .qb:nth-last-child(-n+2) { border-bottom: 1px solid var(--rule); }
  .qb:last-child { border-bottom: none; }
  .qb-name       { font-size: 56px; }
  .numpad {
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(4, 58px);
  }
  .pin-masthead { left: 20px; right: 20px; }
}
</style>
</head>
<body>

<!-- ═══════════════ PIN SCREEN ═══════════════ -->
<div id="pin-screen">

  <div class="pin-masthead">
    <div class="logo">PORTAL</div>
    <div class="meta">Louis Haywood / Private</div>
  </div>

  <div class="pin-body">
    <!-- Recommended: 64×64px circular headshot or avatar of Louis Haywood, shown centred above the PIN prompt -->
    <img src="https://louishaywood.uk/pfp.jpg" alt="Louis Haywood" class="pin-avatar">
    <div class="pin-label">ENTER PIN</div>

    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="pin-error" id="pin-error">INCORRECT — TRY AGAIN</div>

    <div class="numpad">
      <button class="num-btn" data-n="1">1</button>
      <button class="num-btn" data-n="2">2</button>
      <button class="num-btn" data-n="3">3</button>
      <button class="num-btn" data-n="4">4</button>
      <button class="num-btn" data-n="5">5</button>
      <button class="num-btn" data-n="6">6</button>
      <button class="num-btn" data-n="7">7</button>
      <button class="num-btn" data-n="8">8</button>
      <button class="num-btn" data-n="9">9</button>
      <button class="num-btn ghost" disabled aria-hidden="true"></button>
      <button class="num-btn" data-n="0">0</button>
      <button class="num-btn del" id="del-btn">⌫</button>
    </div>
  </div>

</div>

<!-- ═══════════════ MAIN PORTAL ═══════════════ -->
<div id="portal">

  <!-- HEADER -->
  <header class="portal-header">
    <div class="header-left">
      <!-- Recommended: 36×36px small circular avatar/headshot, appears inline in the header beside your name -->
      <img src="https://louishaywood.uk/pfp.jpg" alt="" class="header-avatar" aria-hidden="true">
      <div class="portal-title">PORTAL</div>
      <div class="portal-owner">Louis Haywood</div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-str" id="date-str">Loading…</div>
    </div>
  </header>

  <!-- SEARCH -->
  <section class="search-bar">
    <form class="search-inner" action="https://www.google.com/search" method="GET" target="_blank">
      <div class="search-prefix">Search</div>
      <input id="q" name="q" type="text" placeholder="Search Google…" autocomplete="off" spellcheck="false">
      <button class="search-go" type="submit" aria-label="Search">→</button>
    </form>
  </section>

  <!-- QUICK BUTTONS -->
  <main class="quick-grid">

    <!-- 01 WEBSITE -->
    <a class="qb" href="https://louishaywood.uk" target="_blank" rel="noopener">
      <div class="qb-top">
        <span class="qb-num">01</span>
        <span class="qb-badge">personal</span>
      </div>
      <div class="qb-center">
        <div class="qb-name">WEBSITE</div>
        <div class="qb-url">louishaywood.uk</div>
      </div>
      <div class="qb-bottom">
        <span class="qb-arrow">→</span>
      </div>
    </a>

    <!-- 02 GITHUB -->
    <a class="qb" href="https://github.com/Louis-haywood" target="_blank" rel="noopener">
      <div class="qb-top">
        <span class="qb-num">02</span>
        <span class="qb-badge">code</span>
      </div>
      <div class="qb-center">
        <div class="qb-name">GITHUB</div>
        <div class="qb-url">github.com/Louis-haywood</div>
      </div>
      <div class="qb-bottom">
        <span class="qb-arrow">→</span>
      </div>
    </a>

    <!-- 03 QLAB OSC -->
    <a class="qb" href="https://osc.louishaywood.uk/" target="_blank" rel="noopener">
      <div class="qb-top">
        <span class="qb-num">03</span>
        <span class="qb-badge">live</span>
      </div>
      <div class="qb-center">
        <div class="qb-name">QLAB OSC</div>
        <div class="qb-url">osc.louishaywood.uk</div>
      </div>
      <div class="qb-bottom">
        <span class="qb-arrow">→</span>
      </div>
    </a>

    <!-- 04 CDN -->
    <a class="qb" href="https://cdn.haywood.ltd" target="_blank" rel="noopener">
      <div class="qb-top">
        <span class="qb-num">04</span>
        <span class="qb-badge">cdn</span>
      </div>
      <div class="qb-center">
        <div class="qb-name">CDN</div>
        <div class="qb-url">cdn.haywood.ltd</div>
      </div>
      <div class="qb-bottom">
        <span class="qb-arrow">→</span>
      </div>
    </a>

  </main>

  <!-- FOOTER -->
  <footer class="portal-footer">
    <div class="footer-id">LH / PORTAL — Private Access</div>
    <button class="lock-btn" id="lock-btn">LOCK</button>
  </footer>

</div><!-- #portal -->

<script>
(function () {
  'use strict';

  const PIN        = '7890';
  const STORE_KEY  = 'lh_portal_v1';
  const EXPIRY_MS  = 90 * 24 * 60 * 60 * 1000;

  let digits = '';

  // ── auth helpers ────────────────────────────────────────────────
  function authed() {
    try {
      const d = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
      return d && (Date.now() - d.ts) < EXPIRY_MS;
    } catch { return false; }
  }

  function grant() {
    localStorage.setItem(STORE_KEY, JSON.stringify({ ts: Date.now() }));
  }

  function revoke() {
    localStorage.removeItem(STORE_KEY);
  }

  // ── PIN UI ───────────────────────────────────────────────────────
  function syncDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < digits.length);
    }
  }

  function badPin() {
    const dotsEl = document.getElementById('pin-dots');
    const errEl  = document.getElementById('pin-error');
    dotsEl.classList.add('shake');
    errEl.classList.add('visible');
    setTimeout(() => dotsEl.classList.remove('shake'), 450);
    setTimeout(() => errEl.classList.remove('visible'), 2200);
    digits = '';
    syncDots();
  }

  function unlock() {
    grant();
    const ps = document.getElementById('pin-screen');
    const pt = document.getElementById('portal');
    ps.classList.add('unlocking');
    setTimeout(() => {
      ps.style.display = 'none';
      pt.classList.add('visible');
      startClock();
    }, 580);
  }

  function push(d) {
    if (digits.length >= 4) return;
    digits += d;
    syncDots();
    if (digits.length === 4) {
      // short delay so the 4th dot is visible before checking
      setTimeout(() => {
        if (digits === PIN) unlock();
        else badPin();
      }, 90);
    }
  }

  function pop() {
    digits = digits.slice(0, -1);
    syncDots();
  }

  // ── clock ────────────────────────────────────────────────────────
  const DAYS   = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  function tick() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    const s = String(n.getSeconds()).padStart(2,'0');
    const clockEl = document.getElementById('clock');
    const dateEl  = document.getElementById('date-str');
    if (clockEl) clockEl.textContent = `${h}:${m}:${s}`;
    if (dateEl)  dateEl.textContent  = `${DAYS[n.getDay()]} ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  }

  function startClock() {
    tick();
    setInterval(tick, 1000);
  }

  // ── init ─────────────────────────────────────────────────────────
  if (authed()) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('portal').classList.add('visible');
    startClock();
  }

  // numpad clicks
  document.querySelectorAll('.num-btn[data-n]').forEach(btn => {
    btn.addEventListener('click', () => push(btn.dataset.n));
  });
  document.getElementById('del-btn').addEventListener('click', pop);

  // keyboard support on PIN screen
  document.addEventListener('keydown', e => {
    const ps = document.getElementById('pin-screen');
    if (ps.style.display === 'none') {
      // portal is live — press / to focus search
      if (e.key === '/' && document.activeElement.id !== 'q') {
        e.preventDefault();
        document.getElementById('q').focus();
      }
      return;
    }
    if (e.key >= '0' && e.key <= '9')  push(e.key);
    else if (e.key === 'Backspace')     pop();
  });

  // lock button
  document.getElementById('lock-btn').addEventListener('click', () => {
    revoke();
    location.reload();
  });

}());
</script>
</body>
</html>
